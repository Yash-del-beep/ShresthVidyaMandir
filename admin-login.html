<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login | Shreshtha Vidya Mandir</title>

<link rel="stylesheet"
href="assets/css/admin-login.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="login-container">

<div class="login-card">

<img
src="assets/images/logo.png"
class="logo"
alt="Logo">

<h2>Admin Login</h2>

<p>

Shreshtha Vidya Mandir

</p>

<form id="loginForm">

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

</div>

<button
type="submit"
id="loginBtn">

Login

</button>

</form>

<p id="loginMessage"></p>

</div>

</div>

<script type="module"
src="assets/js/firebase.js"></script>

<script type="module"
src="assets/js/admin-login.js"></script>

</body>

</html>
